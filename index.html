<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CF Docs</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1/mammoth.browser.min.js"></script>
  <style>
    :root {
      --sidebar-bg: #0D1117;
      --sidebar-hover: #161B22;
      --sidebar-border: #21262D;
      --sidebar-text: #8B949E;
      --sidebar-text-active: #F0F6FC;
      --accent: #2F81F7;
      --accent-subtle: rgba(47,129,247,0.12);
      --page-bg: #F6F8FA;
      --border: #D0D7DE;
      --text-primary: #1F2328;
      --text-secondary: #656D76;
      --header-bg: #ffffff;
      --card-bg: #ffffff;
      --dropdown-bg: #ffffff;
      --input-bg: #ffffff;
      --hover-bg: #EEF2F5;
      --code-bg: #EFF1F3;
      --code-color: #CF222E;
      --blockquote-color: #0550AE;
      --th-bg: #F6F8FA;
      --tr-even-bg: #F9FAFB;
      --wiki-p-color: #2D3748;
      --wiki-h-color: #0D1117;
    }
    body.dark {
      --page-bg: #010409;
      --border: #30363D;
      --text-primary: #E6EDF3;
      --text-secondary: #8B949E;
      --header-bg: #161B22;
      --card-bg: #0D1117;
      --dropdown-bg: #161B22;
      --input-bg: #0D1117;
      --hover-bg: #21262D;
      --code-bg: #21262D;
      --code-color: #FF7B72;
      --blockquote-color: #79C0FF;
      --th-bg: #161B22;
      --tr-even-bg: #161B22;
      --wiki-p-color: #C9D1D9;
      --wiki-h-color: #E6EDF3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', -apple-system, sans-serif;
      background: var(--page-bg);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #root { display: flex; flex-direction: column; height: 100%; }

    /* ── Wiki content typography ───────────────────────────── */
    .wiki-content {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1rem;
      line-height: 1.85;
      color: var(--text-primary);
    }
    .wiki-content h1 {
      font-family: 'Sora', sans-serif;
      font-size: 1.875rem; font-weight: 700;
      margin: 0 0 1.5rem;
      padding-bottom: 0.6rem;
      border-bottom: 2px solid var(--border);
      color: var(--wiki-h-color);
      letter-spacing: -0.02em;
    }
    .wiki-content h2 {
      font-family: 'Sora', sans-serif;
      font-size: 1.375rem; font-weight: 600;
      margin: 2.5rem 0 0.875rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
      color: var(--wiki-h-color);
      scroll-margin-top: 80px;
    }
    .wiki-content h3 {
      font-family: 'Sora', sans-serif;
      font-size: 1.125rem; font-weight: 600;
      margin: 2rem 0 0.625rem;
      color: var(--wiki-h-color);
      scroll-margin-top: 80px;
    }
    .wiki-content h4 {
      font-family: 'Sora', sans-serif;
      font-size: 1rem; font-weight: 600;
      margin: 1.5rem 0 0.5rem;
      color: var(--wiki-h-color);
      scroll-margin-top: 80px;
    }
    .wiki-content h1[id], .wiki-content h2[id], .wiki-content h3[id], .wiki-content h4[id] {
      scroll-margin-top: 72px;
    }
    .wiki-content p { margin: 0.875rem 0; color: var(--wiki-p-color); }
    .wiki-content ul, .wiki-content ol { margin: 0.875rem 0; padding-left: 1.875rem; color: var(--wiki-p-color); }
    .wiki-content li { margin: 0.35rem 0; line-height: 1.75; }
    .wiki-content code {
      background: var(--code-bg);
      color: var(--code-color);
      padding: 0.15em 0.45em;
      border-radius: 4px;
      font-size: 0.85em;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }
    .wiki-content pre {
      background: #161B22;
      border: 1px solid #30363D;
      padding: 1.25rem 1.5rem;
      border-radius: 8px;
      overflow-x: auto;
      margin: 1.25rem 0;
    }
    .wiki-content pre code {
      background: none;
      color: #E6EDF3;
      padding: 0;
      font-size: 0.875rem;
    }
    .wiki-content blockquote {
      border-left: 3px solid var(--accent);
      background: rgba(47,129,247,0.05);
      margin: 1.25rem 0;
      padding: 0.875rem 1.25rem;
      border-radius: 0 6px 6px 0;
      color: var(--blockquote-color);
    }
    .wiki-content table { border-collapse: collapse; width: 100%; margin: 1.25rem 0; font-size: 0.9rem; font-family: 'Sora', sans-serif; }
    .wiki-content th {
      background: var(--th-bg);
      font-weight: 600;
      border: 1px solid var(--border);
      padding: 0.6rem 1rem;
      text-align: left;
      font-size: 0.8125rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
    }
    .wiki-content td { border: 1px solid var(--border); padding: 0.625rem 1rem; }
    .wiki-content tr:nth-child(even) td { background: var(--tr-even-bg); }
    .wiki-content a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(47,129,247,0.3); transition: border-color 0.15s; }
    .wiki-content a:hover { border-bottom-color: var(--accent); }
    .wiki-content hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }
    .wiki-content img { max-width: 100%; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .wiki-content strong { font-weight: 700; }

    /* ── Sidebar nav ───────────────────────────────────────── */
    .nav-item {
      display: flex; align-items: center;
      cursor: pointer; border-radius: 6px;
      transition: background 0.12s, color 0.12s;
      user-select: none; position: relative;
      color: var(--sidebar-text);
    }
    .nav-item:hover { background: var(--sidebar-hover); color: var(--sidebar-text-active); }
    .nav-item.active { background: var(--accent-subtle); color: var(--sidebar-text-active); }
    .nav-item.active::before {
      content: '';
      position: absolute; left: 0; top: 3px; bottom: 3px;
      width: 2px; background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    /* ── Scrollbars ────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
    .light-scroll::-webkit-scrollbar-thumb { background: #CBD5E1; }
    .light-scroll::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

    /* ── Skeleton shimmer ──────────────────────────────────── */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 400px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }
    .shimmer-light {
      background: linear-gradient(90deg, #F1F5F9 25%, #E2E8F0 50%, #F1F5F9 75%);
      background-size: 400px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Docx (mammoth) extra resets ──────────────────────────── */
    .docx-content table { border-collapse: collapse; width: 100%; margin: 1.25rem 0; }
    .docx-content td, .docx-content th { border: 1px solid var(--border); padding: 0.5rem 0.875rem; }
    .docx-content th { background: var(--th-bg); font-weight: 600; font-family: 'Sora', sans-serif; font-size: 0.8125rem; }
    .docx-content img { max-width: 100%; border-radius: 6px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    if (localStorage.getItem('cf_theme') === 'dark') document.body.classList.add('dark');
  </script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─── Download helpers ────────────────────────────────────────────────────────
    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    async function collectAllFiles(creds, branch, dirPath) {
      const items = await fetchDir(creds, branch, dirPath);
      const files = [];
      for (const item of items) {
        if (item.type === 'commit_directory') {
          files.push(...await collectAllFiles(creds, branch, item.path));
        } else {
          files.push(item.path);
        }
      }
      return files;
    }

    async function downloadSingleFile(creds, branch, path) {
      const text = await fetchFile(creds, branch, path);
      triggerDownload(new Blob([text], { type: 'text/plain' }), path.split('/').pop());
    }

    async function downloadFolderAsZip(creds, branch, dirPath, onProgress) {
      const zip = new JSZip();
      const files = await collectAllFiles(creds, branch, dirPath);
      let done = 0;
      await Promise.all(files.map(async fp => {
        const text = await fetchFile(creds, branch, fp);
        zip.file(fp.substring(dirPath.length + 1), text);
        onProgress(++done, files.length);
      }));
      const blob = await zip.generateAsync({ type: 'blob' });
      triggerDownload(blob, dirPath.split('/').pop() + '.zip');
    }
    // ────────────────────────────────────────────────────────────────────────────

    const WORKSPACE = 'creative-force-io';
    const REPO = 'cfplatformdocs';
    const DOCS_PATH = 'docs';

    function authHeader(u, p) { return 'Basic ' + btoa(`${u}:${p}`); }

    async function bbFetch(url, creds) {
      const res = await fetch(url, { headers: { 'Authorization': authHeader(creds.username, creds.appPassword) } });
      if (res.status === 401) throw new Error('401: Sai username hoặc App Password');
      if (res.status === 404) throw new Error('404: Không tìm thấy');
      if (!res.ok) throw new Error(`Lỗi ${res.status}`);
      return res;
    }

    async function fetchBranches(creds) {
      let branches = [], url = `https://api.bitbucket.org/2.0/repositories/${WORKSPACE}/${REPO}/refs/branches?pagelen=100&sort=-target.date`;
      while (url) {
        const data = await (await bbFetch(url, creds)).json();
        branches = branches.concat(data.values.map(b => b.name));
        url = data.next || null;
      }
      return branches;
    }

    async function fetchDir(creds, branch, path) {
      let items = [], url = `https://api.bitbucket.org/2.0/repositories/${WORKSPACE}/${REPO}/src/${encodeURIComponent(branch)}/${path}/?pagelen=100`;
      while (url) {
        const data = await (await bbFetch(url, creds)).json();
        items = items.concat(data.values);
        url = data.next || null;
      }
      items.sort((a, b) => {
        if (a.type === b.type) return a.path.localeCompare(b.path);
        return a.type === 'commit_directory' ? -1 : 1;
      });
      return items;
    }

    async function fetchFile(creds, branch, path) {
      const res = await bbFetch(`https://api.bitbucket.org/2.0/repositories/${WORKSPACE}/${REPO}/src/${encodeURIComponent(branch)}/${path}`, creds);
      return res.text();
    }

    // ─── Icons ──────────────────────────────────────────────────────────────────
    const IcoFolder = ({ open }) => (
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style={{flexShrink:0}}>
        {open
          ? <path d="M1 3.5A1.5 1.5 0 012.5 2h2.764c.958 0 1.76.56 2.311 1.184C7.985 3.648 8.48 4 9 4h4.5A1.5 1.5 0 0115 5.5v1H1V3.5zM0 7v6.5A1.5 1.5 0 001.5 15h13a1.5 1.5 0 001.5-1.5V7H0z"/>
          : <path d="M1 3.5A1.5 1.5 0 012.5 2h2.764c.958 0 1.76.56 2.311 1.184C7.985 3.648 8.48 4 9 4h4.5A1.5 1.5 0 0115 5.5v7a1.5 1.5 0 01-1.5 1.5h-11A1.5 1.5 0 011 12.5v-9z"/>
        }
      </svg>
    );
    const IcoFile = () => (
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" style={{flexShrink:0}}>
        <path fillRule="evenodd" d="M14 4.5V14a2 2 0 01-2 2H4a2 2 0 01-2-2V2a2 2 0 012-2h5.5L14 4.5zm-3 0A1.5 1.5 0 019.5 3V1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V4.5h-2z"/>
      </svg>
    );
    const IcoChevronRight = () => (
      <svg width="9" height="9" viewBox="0 0 16 16" fill="currentColor" style={{flexShrink:0,transition:'transform 0.15s'}}>
        <path fillRule="evenodd" d="M4.646 1.646a.5.5 0 01.708 0l6 6a.5.5 0 010 .708l-6 6a.5.5 0 01-.708-.708L10.293 8 4.646 2.354a.5.5 0 010-.708z"/>
      </svg>
    );
    const IcoChevronDown = () => (
      <svg width="9" height="9" viewBox="0 0 16 16" fill="currentColor" style={{flexShrink:0}}>
        <path fillRule="evenodd" d="M1.646 4.646a.5.5 0 01.708 0L8 10.293l5.646-5.647a.5.5 0 01.708.708l-6 6a.5.5 0 01-.708 0l-6-6a.5.5 0 010-.708z"/>
      </svg>
    );
    const IcoDownload = () => (
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
        <path d="M.5 9.9a.5.5 0 01.5.5v2.5a1 1 0 001 1h12a1 1 0 001-1v-2.5a.5.5 0 011 0v2.5a2 2 0 01-2 2H2a2 2 0 01-2-2v-2.5a.5.5 0 01.5-.5z"/>
        <path d="M7.646 11.854a.5.5 0 00.708 0l3-3a.5.5 0 00-.708-.708L8.5 10.293V1.5a.5.5 0 00-1 0v8.793L5.354 8.146a.5.5 0 10-.708.708l3 3z"/>
      </svg>
    );
    const IcoBranch = () => (
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
        <path fillRule="evenodd" d="M11.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122V6A2.5 2.5 0 0110 8.5H6a1 1 0 00-1 1v1.128a2.251 2.251 0 11-1.5 0V5.372a2.25 2.25 0 111.5 0v1.836A2.492 2.492 0 016 7h4a1 1 0 001-1v-.628A2.25 2.25 0 019.5 3.25zM4.25 12a.75.75 0 100 1.5.75.75 0 000-1.5zM3.5 3.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0z"/>
      </svg>
    );
    const IcoSpinner = () => (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{animation:'spin 0.7s linear infinite'}}>
        <style>{'@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}'}</style>
        <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeOpacity="0.25"/>
        <path d="M12 2a10 10 0 0110 10" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/>
      </svg>
    );

    // ─── Settings Screen ─────────────────────────────────────────────────────────
    function Settings({ onSave, error, loading }) {
      const [u, setU] = useState(() => localStorage.getItem('bb_user') || '');
      const [p, setP] = useState(() => localStorage.getItem('bb_pass') || '');
      const submit = () => u && p && !loading && onSave(u, p);
      return (
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',background:'var(--page-bg)'}}>
          <div style={{background:'#fff',borderRadius:16,boxShadow:'0 4px 24px rgba(0,0,0,0.08),0 1px 3px rgba(0,0,0,0.06)',padding:'2.5rem',width:400,border:'1px solid var(--border)'}}>

            {/* Logo */}
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:28}}>
              <div style={{width:44,height:44,background:'var(--sidebar-bg)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:15,letterSpacing:'0.05em',fontFamily:'Sora,sans-serif'}}>CF</div>
              <div>
                <div style={{fontWeight:700,fontSize:'1.0625rem',color:'var(--text-primary)',fontFamily:'Sora,sans-serif',letterSpacing:'-0.01em'}}>CF Docs Viewer</div>
                <div style={{fontSize:'0.75rem',color:'var(--text-secondary)',marginTop:1,fontFamily:'monospace'}}>{WORKSPACE}/{REPO}</div>
              </div>
            </div>

            {error && (
              <div style={{background:'#FFF0F0',border:'1px solid #FECACA',borderRadius:8,padding:'0.6rem 0.875rem',fontSize:'0.8125rem',color:'#B91C1C',marginBottom:16}}>
                {error}
              </div>
            )}

            <div style={{display:'flex',flexDirection:'column',gap:16}}>
              <div>
                <label style={{display:'block',fontSize:'0.8125rem',fontWeight:500,color:'var(--text-primary)',marginBottom:6}}>Bitbucket Username</label>
                <input type="text" value={u} onChange={e => setU(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && submit()}
                  disabled={loading}
                  style={{width:'100%',border:'1px solid var(--border)',borderRadius:8,padding:'0.5625rem 0.75rem',fontSize:'0.875rem',outline:'none',fontFamily:'Sora,sans-serif',color:'var(--text-primary)',background: loading ? '#F9FAFB' : '#fff',transition:'border-color 0.15s'}}
                  onFocus={e => e.target.style.borderColor = 'var(--accent)'}
                  onBlur={e => e.target.style.borderColor = 'var(--border)'}
                  placeholder="your.username" autoFocus />
              </div>
              <div>
                <label style={{display:'block',fontSize:'0.8125rem',fontWeight:500,color:'var(--text-primary)',marginBottom:6}}>App Password</label>
                <input type="password" value={p} onChange={e => setP(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && submit()}
                  disabled={loading}
                  style={{width:'100%',border:'1px solid var(--border)',borderRadius:8,padding:'0.5625rem 0.75rem',fontSize:'0.875rem',outline:'none',fontFamily:'Sora,sans-serif',color:'var(--text-primary)',background: loading ? '#F9FAFB' : '#fff',transition:'border-color 0.15s'}}
                  onFocus={e => e.target.style.borderColor = 'var(--accent)'}
                  onBlur={e => e.target.style.borderColor = 'var(--border)'}
                  placeholder="xxxx-xxxx-xxxx-xxxx" />
                <p style={{fontSize:'0.75rem',color:'var(--text-secondary)',marginTop:6,lineHeight:1.5}}>
                  Bitbucket → Personal Settings → App passwords → <strong>Repositories: Read</strong>
                </p>
              </div>
              <button onClick={submit} disabled={!u || !p || loading}
                style={{width:'100%',background: (!u||!p||loading) ? '#93C5FD' : 'var(--accent)',color:'white',border:'none',borderRadius:8,padding:'0.625rem',fontSize:'0.875rem',fontWeight:600,cursor: (!u||!p||loading) ? 'not-allowed' : 'pointer',transition:'background 0.15s',display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontFamily:'Sora,sans-serif'}}>
                {loading ? <><IcoSpinner /> Đang kết nối...</> : 'Kết nối'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Loading Screen ──────────────────────────────────────────────────────────
    function LoadingScreen({ message }) {
      return (
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',background:'var(--page-bg)'}}>
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:24}}>
            <div style={{position:'relative'}}>
              <div style={{position:'absolute',inset:-8,background:'rgba(47,129,247,0.15)',borderRadius:20,animation:'pulse 2s cubic-bezier(0.4,0,0.6,1) infinite'}}></div>
              <style>{'@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}'}</style>
              <div style={{position:'relative',width:56,height:56,background:'var(--sidebar-bg)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:17,fontFamily:'Sora,sans-serif',letterSpacing:'0.05em',boxShadow:'0 8px 24px rgba(0,0,0,0.2)'}}>CF</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
              <div style={{display:'flex',gap:5}}>
                {[0,1,2].map(i => (
                  <div key={i} style={{width:7,height:7,borderRadius:'50%',background:'var(--accent)',animation:`bounce 0.8s ${i*0.15}s infinite`}}/>
                ))}
                <style>{'@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}'}</style>
              </div>
              <span style={{fontSize:'0.8125rem',color:'var(--text-secondary)',fontFamily:'Sora,sans-serif'}}>{message || 'Đang tải...'}</span>
            </div>
            {/* Skeleton layout preview */}
            <div style={{display:'flex',gap:16,opacity:0.35,marginTop:8}}>
              <div style={{width:160,display:'flex',flexDirection:'column',gap:6}}>
                {[60,85,50,75,90,55,70].map((w,i) => (
                  <div key={i} className="shimmer-light" style={{height:10,width:`${w}%`,animationDelay:`${i*0.09}s`}}/>
                ))}
              </div>
              <div style={{width:280,display:'flex',flexDirection:'column',gap:8}}>
                <div className="shimmer-light" style={{height:22,width:'70%',animationDelay:'0s'}}/>
                {[100,85,95,70,90,80].map((w,i) => (
                  <div key={i} className="shimmer-light" style={{height:10,width:`${w}%`,animationDelay:`${i*0.07}s`}}/>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── Sidebar Skeleton ────────────────────────────────────────────────────────
    function SidebarSkeleton() {
      return (
        <div style={{padding:'8px 10px',display:'flex',flexDirection:'column',gap:6}}>
          {[70,55,85,60,75,50,90,65,80,55].map((w,i) => (
            <div key={i} className="shimmer" style={{height:24,width:`${w}%`,animationDelay:`${i*0.07}s`}}/>
          ))}
        </div>
      );
    }

    // ─── File Content Skeleton ───────────────────────────────────────────────────
    function ContentSkeleton() {
      return (
        <div style={{maxWidth:1100,margin:'0 auto',padding:'2.5rem 3rem'}}>
          <div className="shimmer-light" style={{height:36,width:'60%',marginBottom:24}}/>
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:32}}>
            {[100,92,88,96,75].map((w,i) => <div key={i} className="shimmer-light" style={{height:14,width:`${w}%`,animationDelay:`${i*0.06}s`}}/>)}
          </div>
          <div className="shimmer-light" style={{height:24,width:'40%',marginBottom:16}}/>
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:32}}>
            {[90,100,85,95].map((w,i) => <div key={i} className="shimmer-light" style={{height:14,width:`${w}%`,animationDelay:`${i*0.06}s`}}/>)}
          </div>
          <div className="shimmer-light" style={{height:120,borderRadius:8,marginBottom:20}}/>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {[88,96,72,84].map((w,i) => <div key={i} className="shimmer-light" style={{height:14,width:`${w}%`,animationDelay:`${i*0.06}s`}}/>)}
          </div>
        </div>
      );
    }

    // ─── Toast ───────────────────────────────────────────────────────────────────
    function ToastList({ toasts }) {
      if (!toasts.length) return null;
      return (
        <div style={{position:'fixed',bottom:20,right:20,zIndex:999999,display:'flex',flexDirection:'column',gap:8,pointerEvents:'none'}}>
          {toasts.map(t => (
            <div key={t.id} style={{
              background: t.type==='success' ? '#1A7F37' : t.type==='error' ? '#CF222E' : '#1F2328',
              color:'#fff', borderRadius:10, padding:'11px 16px',
              boxShadow:'0 4px 20px rgba(0,0,0,0.3)', border:'1px solid rgba(255,255,255,0.1)',
              display:'flex', alignItems:'center', gap:10,
              fontSize:'0.8125rem', fontFamily:'Sora,sans-serif',
              animation:'slideUp 0.2s ease', minWidth:260, maxWidth:340,
            }}>
              {t.type==='success'
                ? <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" style={{flexShrink:0}}><path d="M13.854 3.646a.5.5 0 010 .708l-7 7a.5.5 0 01-.708 0l-3.5-3.5a.5.5 0 11.708-.708L6.5 10.293l6.646-6.647a.5.5 0 01.708 0z"/></svg>
                : <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" style={{flexShrink:0}}><path d="M4.646 4.646a.5.5 0 01.708 0L8 7.293l2.646-2.647a.5.5 0 01.708.708L8.707 8l2.647 2.646a.5.5 0 01-.708.708L8 8.707l-2.646 2.647a.5.5 0 01-.708-.708L7.293 8 4.646 5.354a.5.5 0 010-.708z"/></svg>
              }
              <span style={{flex:1,lineHeight:1.4}}>{t.msg}</span>
            </div>
          ))}
        </div>
      );
    }

    // ─── Download Overlay ────────────────────────────────────────────────────────
    function DownloadOverlay({ download }) {
      if (!download) return null;
      const pct = download.total > 0 ? Math.round(download.done / download.total * 100) : 0;
      return (
        <div style={{
          position:'fixed', bottom:20, right:20, zIndex:999998,
          background:'#0D1117', color:'#fff', borderRadius:12,
          padding:'16px 20px', boxShadow:'0 8px 32px rgba(0,0,0,0.4)',
          border:'1px solid #30363D', minWidth:300,
          fontFamily:'Sora,sans-serif', animation:'slideUp 0.22s ease'
        }}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <IcoSpinner/>
            <span style={{fontSize:'0.875rem',fontWeight:600,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
              {download.name}
            </span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <span style={{fontSize:'0.75rem',color:'#8B949E'}}>
              {download.total > 0 ? `${download.done} / ${download.total} files` : 'Đang thu thập files...'}
            </span>
            {download.total > 0 && (
              <span style={{fontSize:'0.75rem',color:'var(--accent)',fontWeight:600}}>{pct}%</span>
            )}
          </div>
          <div style={{height:4,background:'#21262D',borderRadius:3,overflow:'hidden'}}>
            <div style={{
              height:'100%', width: download.total > 0 ? `${pct}%` : '30%',
              background:'var(--accent)', borderRadius:3,
              transition:'width 0.3s ease',
              animation: download.total === 0 ? 'shimmer 1.4s infinite' : 'none',
              backgroundSize: download.total === 0 ? '300px 100%' : 'auto',
              backgroundImage: download.total === 0 ? 'linear-gradient(90deg,#1a5db5 25%,#2F81F7 50%,#1a5db5 75%)' : 'none',
            }}/>
          </div>
        </div>
      );
    }

    // ─── Tree Node ───────────────────────────────────────────────────────────────
    function TreeNode({ item, creds, branch, selectedFile, onSelect, depth, addToast, onDlChange }) {
      const [open, setOpen] = useState(false);
      const [children, setChildren] = useState(null);
      const [loading, setLoading] = useState(false);
      const [dlProgress, setDlProgress] = useState(null);
      const isDir = item.type === 'commit_directory';
      const name = item.path.split('/').pop();
      const isSelected = selectedFile === item.path;

      const handleClick = async () => {
        if (!isDir) { onSelect(item.path); return; }
        if (!open && children === null) {
          setLoading(true);
          try { setChildren(await fetchDir(creds, branch, item.path)); }
          catch (e) { console.error(e); }
          setLoading(false);
        }
        setOpen(!open);
      };

      const handleDownload = async (e) => {
        e.stopPropagation();
        if (dlProgress !== null) return;
        setDlProgress('...');
        try {
          if (isDir) {
            onDlChange({ name: name + '.zip', done: 0, total: 0 });
            await downloadFolderAsZip(creds, branch, item.path, (done, total) => {
              onDlChange({ name: name + '.zip', done, total });
              setDlProgress(`${done}/${total}`);
            });
            onDlChange(null);
            addToast('success', `Downloaded ${name}.zip`);
          } else {
            await downloadSingleFile(creds, branch, item.path);
            addToast('success', `Downloaded ${name}`);
          }
        } catch(err) {
          onDlChange(null);
          addToast('error', `Download failed: ${err.message}`);
        }
        setDlProgress(null);
      };

      return (
        <div>
          <div
            onClick={handleClick}
            title={name}
            className={`nav-item${isSelected ? ' active' : ''}`}
            style={{padding:`5px 8px 5px ${12 + depth * 16}px`,gap:6,fontSize:'0.8125rem',fontWeight: isSelected ? 500 : 400}}
          >
            <span style={{color: isSelected ? 'var(--accent)' : 'rgba(139,148,158,0.6)',width:9,flexShrink:0,display:'flex',alignItems:'center'}}>
              {isDir ? (open ? <IcoChevronDown/> : <IcoChevronRight/>) : null}
            </span>
            <span style={{color: isSelected ? '#79C0FF' : '#8B949E',display:'flex',alignItems:'center'}}>
              {isDir ? <IcoFolder open={open}/> : <IcoFile/>}
            </span>
            <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</span>
            {loading
              ? <span style={{marginLeft:'auto',color:'var(--accent)',flexShrink:0}}><IcoSpinner/></span>
              : <button
                  onClick={handleDownload}
                  title={isDir ? 'Download ZIP' : 'Download'}
                  style={{marginLeft:'auto',background: dlProgress !== null ? 'rgba(47,129,247,0.15)' : 'rgba(139,148,158,0.12)',border:'none',cursor:'pointer',color: dlProgress !== null ? 'var(--accent)' : '#C9D1D9',padding:'3px 6px',borderRadius:5,display:'flex',alignItems:'center',gap:4,flexShrink:0,fontSize:'0.6875rem',fontWeight:500,transition:'all 0.15s',fontFamily:'Sora,sans-serif'}}
                  onMouseEnter={e => { e.currentTarget.style.background='rgba(47,129,247,0.2)'; e.currentTarget.style.color='var(--accent)'; }}
                  onMouseLeave={e => { if(dlProgress===null){ e.currentTarget.style.background='rgba(139,148,158,0.12)'; e.currentTarget.style.color='#C9D1D9'; } }}
                >
                  {dlProgress !== null
                    ? <><IcoSpinner/><span>{dlProgress}</span></>
                    : <><IcoDownload/></>}
                </button>
            }
          </div>

          {open && loading && children === null && (
            <div style={{padding:`4px 0 4px ${12 + (depth+1)*16}px`,display:'flex',flexDirection:'column',gap:5}}>
              {[65,82,50].map((w,i) => (
                <div key={i} className="shimmer" style={{height:20,width:`${w}%`,animationDelay:`${i*0.1}s`}}/>
              ))}
            </div>
          )}
          {open && children && children.map(c => (
            <TreeNode key={c.path} item={c} creds={creds} branch={branch}
              selectedFile={selectedFile} onSelect={onSelect} depth={depth + 1}
              addToast={addToast} onDlChange={onDlChange} />
          ))}
        </div>
      );
    }

    // ─── TOC Panel ───────────────────────────────────────────────────────────────
    function TocPanel({ toc, containerRef }) {
      const [active, setActive] = useState('');

      useEffect(() => {
        const el = containerRef.current;
        if (!el || !toc.length) return;
        const handler = () => {
          const rect = el.getBoundingClientRect();
          let current = toc[0]?.id || '';
          el.querySelectorAll('h1[id],h2[id],h3[id],h4[id]').forEach(h => {
            if (h.getBoundingClientRect().top - rect.top <= 100) current = h.id;
          });
          setActive(current);
        };
        el.addEventListener('scroll', handler, { passive: true });
        handler();
        return () => el.removeEventListener('scroll', handler);
      }, [toc]);

      if (!toc.length) return null;

      return (
        <aside className="light-scroll" style={{width:220,flexShrink:0,borderLeft:'1px solid var(--border)',background:'var(--page-bg)',overflowY:'auto',padding:'24px 0'}}>
          <div style={{padding:'0 16px',fontSize:'0.6875rem',fontWeight:600,color:'var(--text-secondary)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>
            On this page
          </div>
          <nav style={{display:'flex',flexDirection:'column',gap:1}}>
            {toc.map(item => (
              <button
                key={item.id}
                onClick={() => document.getElementById(item.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' })}
                title={item.text}
                style={{
                  background: active===item.id ? 'rgba(47,129,247,0.07)' : 'none',
                  border: 'none',
                  borderLeft: active===item.id ? '2px solid var(--accent)' : '2px solid transparent',
                  cursor: 'pointer',
                  textAlign: 'left',
                  padding: `4px 16px 4px ${14 + (item.level-1)*12}px`,
                  fontSize: '0.78125rem',
                  color: active===item.id ? 'var(--accent)' : 'var(--text-secondary)',
                  fontWeight: active===item.id ? 500 : 400,
                  lineHeight: 1.5,
                  overflow: 'hidden',
                  textOverflow: 'ellipsis',
                  whiteSpace: 'nowrap',
                  transition: 'all 0.12s',
                  fontFamily: 'Sora,sans-serif',
                }}
                onMouseEnter={e => { if(active!==item.id){ e.currentTarget.style.color='var(--text-primary)'; } }}
                onMouseLeave={e => { if(active!==item.id){ e.currentTarget.style.color='var(--text-secondary)'; } }}
              >
                {item.text}
              </button>
            ))}
          </nav>
        </aside>
      );
    }

    // ─── Main App ────────────────────────────────────────────────────────────────
    function App() {
      const [creds, setCreds] = useState(() => {
        const u = localStorage.getItem('bb_user');
        const p = localStorage.getItem('bb_pass');
        return u && p ? { username: u, appPassword: p } : null;
      });
      const [loginError, setLoginError] = useState(null);
      const [loginLoading, setLoginLoading] = useState(false);
      const [restoring, setRestoring] = useState(() => !!(localStorage.getItem('bb_user') && localStorage.getItem('bb_pass')));
      const [branches, setBranches] = useState([]);
      const [branch, setBranch] = useState('');
      const [rootItems, setRootItems] = useState(null);
      const [selectedFile, setSelectedFile] = useState(null);
      const [content, setContent] = useState('');
      const [loadingFile, setLoadingFile] = useState(false);
      const [error, setError] = useState(null);
      const [branchSearch, setBranchSearch] = useState('');
      const [showBranchList, setShowBranchList] = useState(false);
      const [toc, setToc] = useState([]);
      const [toasts, setToasts] = useState([]);
      const [activeDownload, setActiveDownload] = useState(null);
      const [isDark, setIsDark] = useState(() => localStorage.getItem('cf_theme') === 'dark');
      const [blobUrl, setBlobUrl] = useState(null);
      const contentRef = useRef(null);
      const branchRef = useRef(null);

      const addToast = (type, msg) => {
        const id = Date.now() + Math.random();
        setToasts(t => [...t, { id, type, msg }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
      };

      // Auto-load branches when creds restored from localStorage
      useEffect(() => {
        if (!creds || branches.length > 0) return;
        fetchBranches(creds)
          .then(bs => {
            setBranches(bs);
            setBranch(bs.includes('master') ? 'master' : bs[0] || '');
            const lastFile = localStorage.getItem('bb_last_file');
            if (lastFile) setSelectedFile(lastFile);
          })
          .catch(() => {
            localStorage.removeItem('bb_user');
            localStorage.removeItem('bb_pass');
            setCreds(null);
          })
          .finally(() => setRestoring(false));
      }, [creds]);

      // Load docs root on branch change
      useEffect(() => {
        if (!creds || !branch) return;
        setRootItems(null);
        setSelectedFile(null);
        setContent('');
        fetchDir(creds, branch, DOCS_PATH)
          .then(setRootItems)
          .catch(e => {
            if (e.message.includes('404')) setRootItems([]);
            else setError(e.message);
          });
      }, [creds, branch]);

      // Load file content + remember last viewed
      useEffect(() => {
        if (!selectedFile || !creds) return;
        localStorage.setItem('bb_last_file', selectedFile);
        setBlobUrl(prev => { if (prev) URL.revokeObjectURL(prev); return null; });
        setLoadingFile(true);
        setContent('');
        setError(null);

        const fn = selectedFile.split('/').pop();
        const isImg = /\.(png|jpe?g|gif|svg|webp|bmp|ico)$/i.test(fn);
        const isDoc = /\.docx?$/i.test(fn);
        const rawUrl = `https://api.bitbucket.org/2.0/repositories/${WORKSPACE}/${REPO}/src/${encodeURIComponent(branch)}/${selectedFile}`;

        (async () => {
          try {
            const res = await bbFetch(rawUrl, creds);
            if (isImg) {
              const blob = await res.blob();
              setBlobUrl(URL.createObjectURL(blob));
            } else if (isDoc) {
              try {
                const ab = await res.arrayBuffer();
                const result = await mammoth.convertToHtml({ arrayBuffer: ab });
                setContent(result.value);
              } catch (convErr) {
                setError(`Không thể preview file này: ${convErr.message}`);
              }
            } else {
              setContent(await res.text());
            }
          } catch (e) {
            setError(e.message);
          } finally {
            setLoadingFile(false);
          }
        })();
      }, [selectedFile, branch]);

      // Highlight code + build TOC
      useEffect(() => {
        if (!contentRef.current || !content) return;
        contentRef.current.querySelectorAll('pre code:not(.hljs)').forEach(b => hljs.highlightElement(b));
        const headings = Array.from(contentRef.current.querySelectorAll('h1,h2,h3,h4'));
        const items = headings.map((h, i) => {
          const id = 'h-' + i + '-' + h.textContent.toLowerCase().replace(/[^\w]+/g, '-').replace(/^-|-$/g, '');
          h.id = id;
          return { id, text: h.textContent, level: parseInt(h.tagName[1]) };
        });
        setToc(items);
      }, [content]);

      // Reset TOC when file changes
      useEffect(() => { setToc([]); }, [selectedFile]);

      // Apply dark mode class
      useEffect(() => {
        document.body.classList.toggle('dark', isDark);
        localStorage.setItem('cf_theme', isDark ? 'dark' : 'light');
      }, [isDark]);

      // Close branch dropdown on outside click
      useEffect(() => {
        if (!showBranchList) return;
        const handler = (e) => {
          if (branchRef.current && !branchRef.current.contains(e.target)) {
            setShowBranchList(false);
          }
        };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [showBranchList]);

      const handleLogin = async (username, appPassword) => {
        const newCreds = { username, appPassword };
        setLoginError(null);
        setLoginLoading(true);
        try {
          const bs = await fetchBranches(newCreds);
          localStorage.setItem('bb_user', username);
          localStorage.setItem('bb_pass', appPassword);
          setCreds(newCreds);
          setBranches(bs);
          setBranch(bs.includes('master') ? 'master' : bs[0] || '');
        } catch (e) {
          setLoginError(e.message);
        } finally {
          setLoginLoading(false);
        }
      };

      if (restoring) return <LoadingScreen message="Đang khôi phục phiên..." />;
      if (!creds) return <Settings onSave={handleLogin} error={loginError} loading={loginLoading} />;

      const filteredBranches = branches.filter(b => b.toLowerCase().includes(branchSearch.toLowerCase()));
      const fileName = selectedFile ? selectedFile.split('/').pop() : null;
      const isMd = fileName && /\.mdx?$/.test(fileName);
      const isImage = fileName && /\.(png|jpe?g|gif|svg|webp|bmp|ico)$/i.test(fileName);
      const isDocFile = fileName && /\.docx?$/i.test(fileName);
      const isHtmlFile = fileName && /\.html?$/i.test(fileName);

      return (<>
        <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>

          {/* ── Header ── */}
          <header style={{background:'var(--header-bg)',borderBottom:'1px solid var(--border)',padding:'0 20px',display:'flex',alignItems:'center',gap:16,height:52,flexShrink:0,zIndex:10}}>
            {/* Logo + title */}
            <div style={{display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
              <div style={{width:30,height:30,background:'var(--sidebar-bg)',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:11,fontFamily:'Sora,sans-serif',letterSpacing:'0.05em'}}>CF</div>
              <span style={{fontWeight:600,fontSize:'0.9375rem',color:'var(--text-primary)',fontFamily:'Sora,sans-serif'}}>Docs</span>
              <span style={{color:'var(--border)',fontSize:18,lineHeight:1}}>·</span>
              <span style={{fontSize:'0.75rem',color:'var(--text-secondary)',fontFamily:'monospace'}}>{WORKSPACE}/{REPO}</span>
            </div>

            {/* Dark mode toggle */}
            <button
              onClick={() => setIsDark(d => !d)}
              title={isDark ? 'Light mode' : 'Dark mode'}
              style={{marginLeft:'auto',background:'none',border:'1px solid var(--border)',borderRadius:7,cursor:'pointer',color:'var(--text-secondary)',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s',flexShrink:0}}
              onMouseEnter={e => { e.currentTarget.style.background='var(--hover-bg)'; e.currentTarget.style.color='var(--text-primary)'; }}
              onMouseLeave={e => { e.currentTarget.style.background='none'; e.currentTarget.style.color='var(--text-secondary)'; }}
            >
              {isDark
                ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              }
            </button>

            {/* Branch selector */}
            <div ref={branchRef} style={{position:'relative'}}>
              <button
                onClick={() => { setShowBranchList(!showBranchList); setBranchSearch(''); }}
                style={{display:'flex',alignItems:'center',gap:7,background:'var(--page-bg)',border:'1px solid var(--border)',borderRadius:8,padding:'5px 10px',fontSize:'0.8125rem',cursor:'pointer',transition:'all 0.15s',color:'var(--text-primary)',fontFamily:'Sora,sans-serif'}}
                onMouseEnter={e => e.currentTarget.style.background='var(--hover-bg)'}
                onMouseLeave={e => e.currentTarget.style.background='var(--page-bg)'}
              >
                <span style={{color:'var(--text-secondary)'}}><IcoBranch/></span>
                <span style={{fontFamily:'monospace',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{branch || 'Select branch'}</span>
                <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor" style={{color:'var(--text-secondary)',flexShrink:0}}>
                  <path fillRule="evenodd" d="M1.646 4.646a.5.5 0 01.708 0L8 10.293l5.646-5.647a.5.5 0 01.708.708l-6 6a.5.5 0 01-.708 0l-6-6a.5.5 0 010-.708z"/>
                </svg>
              </button>

              {showBranchList && (
                <div style={{position:'absolute',right:0,top:'calc(100% + 6px)',width:300,background:'var(--dropdown-bg)',border:'1px solid var(--border)',borderRadius:10,boxShadow:'0 8px 30px rgba(0,0,0,0.2)',zIndex:9999,overflow:'hidden'}}>
                  <div style={{padding:8,borderBottom:'1px solid var(--border)'}}>
                    <input type="text" value={branchSearch} onChange={e => setBranchSearch(e.target.value)}
                      placeholder="Find branch..."
                      autoFocus
                      style={{width:'100%',border:'1px solid var(--border)',borderRadius:6,padding:'5px 10px',fontSize:'0.8125rem',outline:'none',fontFamily:'Sora,sans-serif',color:'var(--text-primary)',background:'var(--input-bg)'}}
                      onFocus={e => e.target.style.borderColor='var(--accent)'}
                      onBlur={e => e.target.style.borderColor='var(--border)'}
                    />
                  </div>
                  <div className="light-scroll" style={{maxHeight:280,overflowY:'auto',padding:'4px 0'}}>
                    {filteredBranches.length === 0
                      ? <div style={{padding:'8px 12px',fontSize:'0.8125rem',color:'var(--text-secondary)'}}>No results</div>
                      : filteredBranches.map(b => (
                        <button key={b} onClick={() => { setBranch(b); setShowBranchList(false); }}
                          style={{width:'100%',textAlign:'left',padding:'6px 12px',background: b===branch ? 'rgba(47,129,247,0.07)' : 'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:8,fontSize:'0.8125rem',color: b===branch ? 'var(--accent)' : 'var(--text-primary)',fontFamily:'Sora,sans-serif',transition:'background 0.1s'}}
                          onMouseEnter={e => { if(b!==branch) e.currentTarget.style.background='var(--hover-bg)'; }}
                          onMouseLeave={e => { if(b!==branch) e.currentTarget.style.background='none'; }}
                        >
                          <span style={{color: b===branch ? 'var(--accent)' : 'var(--text-secondary)'}}><IcoBranch/></span>
                          <span style={{fontFamily:'monospace',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{b}</span>
                          {b === branch && <svg width="12" height="12" viewBox="0 0 16 16" fill="var(--accent)"><path d="M13.854 3.646a.5.5 0 010 .708l-7 7a.5.5 0 01-.708 0l-3.5-3.5a.5.5 0 11.708-.708L6.5 10.293l6.646-6.647a.5.5 0 01.708 0z"/></svg>}
                        </button>
                      ))
                    }
                  </div>
                  <div style={{padding:'5px 12px',borderTop:'1px solid var(--border)',fontSize:'0.6875rem',color:'var(--text-secondary)'}}>
                    {filteredBranches.length} / {branches.length} branches
                  </div>
                </div>
              )}
            </div>
          </header>


          {/* ── Error bar ── */}
          {error && (
            <div style={{background:'#FFFBEB',borderBottom:'1px solid #FDE68A',padding:'8px 20px',fontSize:'0.8125rem',color:'#92400E',display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
              <svg width="14" height="14" viewBox="0 0 16 16" fill="#D97706"><path d="M8 15A7 7 0 118 1a7 7 0 010 14zm0-9.5a.5.5 0 00-.5.5v4a.5.5 0 001 0V6a.5.5 0 00-.5-.5zM8 11a.75.75 0 110 1.5A.75.75 0 018 11z"/></svg>
              {error}
              <button onClick={() => setError(null)} style={{marginLeft:'auto',background:'none',border:'none',cursor:'pointer',color:'#D97706',fontSize:16,lineHeight:1}}>×</button>
            </div>
          )}

          {/* ── Main layout ── */}
          <div style={{display:'flex',flex:1,overflow:'hidden'}}>

            {/* ── Sidebar ── */}
            <aside style={{width:260,background:'var(--sidebar-bg)',flexShrink:0,display:'flex',flexDirection:'column',overflowY:'auto',borderRight:'1px solid var(--sidebar-border)'}}>
              <div style={{padding:'14px 10px 6px 14px',fontSize:'0.6875rem',fontWeight:600,color:'rgba(139,148,158,0.5)',textTransform:'uppercase',letterSpacing:'0.08em',flexShrink:0}}>
                Documentation
              </div>
              <div style={{flex:1,overflowY:'auto',padding:'4px 6px 16px'}}>
                {rootItems === null
                  ? <SidebarSkeleton />
                  : rootItems.length === 0
                  ? <div style={{padding:'12px 10px',fontSize:'0.8125rem',color:'rgba(139,148,158,0.6)'}}>docs/ folder is empty</div>
                  : rootItems.map(item => (
                    <TreeNode key={item.path} item={item} creds={creds} branch={branch}
                      selectedFile={selectedFile} onSelect={setSelectedFile} depth={0}
                      addToast={addToast} onDlChange={setActiveDownload} />
                  ))
                }
              </div>
            </aside>

            {/* ── Content ── */}
            <main ref={contentRef} className="light-scroll" style={{flex:1,overflowY:'auto',background:'var(--page-bg)'}}>
              {!selectedFile ? (
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%'}}>
                  <div style={{textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" strokeWidth="1.5">
                      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                      <polyline points="14 2 14 8 20 8"/>
                      <line x1="16" y1="13" x2="8" y2="13"/>
                      <line x1="16" y1="17" x2="8" y2="17"/>
                      <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    <p style={{fontSize:'0.875rem',color:'#94A3B8',fontFamily:'Sora,sans-serif'}}>Chọn file từ sidebar để xem</p>
                  </div>
                </div>
              ) : loadingFile ? (
                <ContentSkeleton />
              ) : isImage ? (
                <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
                  {/* Breadcrumb for image */}
                  <div style={{display:'flex',alignItems:'center',gap:4,fontSize:'0.75rem',color:'var(--text-secondary)',padding:'10px 20px',borderBottom:'1px solid var(--border)',fontFamily:'monospace',flexShrink:0,background:'var(--header-bg)'}}>
                    {selectedFile.split('/').map((part, i, arr) => (
                      <span key={i} style={{display:'flex',alignItems:'center',gap:4}}>
                        {i > 0 && <span style={{color:'var(--border)',fontSize:14}}>/</span>}
                        <span style={{color: i===arr.length-1 ? 'var(--text-primary)' : 'var(--text-secondary)'}}>{part}</span>
                      </span>
                    ))}
                    <button onClick={async () => { try { await downloadSingleFile(creds, branch, selectedFile); addToast('success', `Downloaded ${fileName}`); } catch(e) { addToast('error', 'Download failed'); } }}
                      style={{marginLeft:'auto',background:'var(--accent)',border:'none',borderRadius:7,cursor:'pointer',color:'#fff',padding:'5px 12px',display:'flex',alignItems:'center',gap:6,fontSize:'0.8125rem',fontWeight:500,fontFamily:'Sora,sans-serif'}}>
                      <IcoDownload/> Download
                    </button>
                  </div>
                  {blobUrl ? (
                    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',padding:'2rem',overflow:'auto',background:'var(--page-bg)'}}>
                      <img src={blobUrl} alt={fileName} style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain',borderRadius:8,boxShadow:'0 4px 24px rgba(0,0,0,0.12)',display:'block'}} />
                    </div>
                  ) : (
                    <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <span style={{color:'var(--text-secondary)',fontFamily:'Sora,sans-serif',fontSize:'0.875rem'}}>Không tải được ảnh</span>
                    </div>
                  )}
                </div>
              ) : isHtmlFile ? (
                <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
                  {/* Breadcrumb for HTML */}
                  <div style={{display:'flex',alignItems:'center',gap:4,fontSize:'0.75rem',color:'var(--text-secondary)',padding:'10px 20px',borderBottom:'1px solid var(--border)',fontFamily:'monospace',flexShrink:0,background:'var(--header-bg)'}}>
                    {selectedFile.split('/').map((part, i, arr) => (
                      <span key={i} style={{display:'flex',alignItems:'center',gap:4}}>
                        {i > 0 && <span style={{color:'var(--border)',fontSize:14}}>/</span>}
                        <span style={{color: i===arr.length-1 ? 'var(--text-primary)' : 'var(--text-secondary)'}}>{part}</span>
                      </span>
                    ))}
                    <button onClick={async () => { try { await downloadSingleFile(creds, branch, selectedFile); addToast('success', `Downloaded ${fileName}`); } catch(e) { addToast('error', 'Download failed'); } }}
                      style={{marginLeft:'auto',background:'var(--accent)',border:'none',borderRadius:7,cursor:'pointer',color:'#fff',padding:'5px 12px',display:'flex',alignItems:'center',gap:6,fontSize:'0.8125rem',fontWeight:500,fontFamily:'Sora,sans-serif'}}>
                      <IcoDownload/> Download
                    </button>
                  </div>
                  <iframe srcDoc={content} sandbox="allow-scripts allow-same-origin"
                    style={{flex:1,width:'100%',border:'none',background:'#fff'}} title={fileName} />
                </div>
              ) : (
                <div style={{maxWidth:1100,margin:'0 auto',padding:'2.5rem 3rem'}}>
                  {/* Breadcrumb */}
                  <div style={{display:'flex',alignItems:'center',gap:4,fontSize:'0.75rem',color:'var(--text-secondary)',marginBottom:24,paddingBottom:16,borderBottom:'1px solid var(--border)',fontFamily:'monospace'}}>
                    {selectedFile.split('/').map((part, i, arr) => (
                      <span key={i} style={{display:'flex',alignItems:'center',gap:4}}>
                        {i > 0 && <span style={{color:'var(--border)',fontSize:14}}>/</span>}
                        <span style={{color: i===arr.length-1 ? 'var(--text-primary)' : 'var(--text-secondary)'}}>{part}</span>
                      </span>
                    ))}
                    <button
                      onClick={async () => { try { await downloadSingleFile(creds, branch, selectedFile); addToast('success', `Downloaded ${fileName}`); } catch(e) { addToast('error', 'Download failed'); } }}
                      title="Download file"
                      style={{marginLeft:'auto',background:'var(--accent)',border:'none',borderRadius:7,cursor:'pointer',color:'#fff',padding:'5px 12px',display:'flex',alignItems:'center',gap:6,fontSize:'0.8125rem',fontWeight:500,transition:'all 0.15s',fontFamily:'Sora,sans-serif',boxShadow:'0 1px 3px rgba(47,129,247,0.3)'}}
                      onMouseEnter={e => { e.currentTarget.style.background='#1a6fd4'; }}
                      onMouseLeave={e => { e.currentTarget.style.background='var(--accent)'; }}
                    >
                      <IcoDownload/> Download
                    </button>
                  </div>

                  {/* Content */}
                  {isMd ? (
                    <div className="wiki-content" dangerouslySetInnerHTML={{
                      __html: marked.parse(content, { gfm: true, breaks: false })
                    }} />
                  ) : isDocFile ? (
                    <div className="wiki-content docx-content" dangerouslySetInnerHTML={{ __html: content }} />
                  ) : (
                    <pre style={{fontSize:'0.875rem',background:'#161B22',border:'1px solid #30363D',borderRadius:8,padding:'1.25rem 1.5rem',overflowX:'auto',color:'#E6EDF3',lineHeight:1.6}}>
                      <code>{content}</code>
                    </pre>
                  )}
                </div>
              )}
            </main>

            {/* ── TOC ── */}
            {(isMd || isDocFile) && toc.length > 0 && <TocPanel toc={toc} containerRef={contentRef} />}
          </div>
        </div>

        <ToastList toasts={toasts} />
        <DownloadOverlay download={activeDownload} />
      </>);
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
